<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Shinobi Way - The Sannin's Journey</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Shojumaru&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --paper: #f4f1ea;      /* Elegant parchment */
            --ink: #1c1917;        /* Deep charcoal/ink */
            --accent: #991b1b;     /* Crimson red stamp */
            --muted: #a8a29e;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c0a09;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #292524 0%, #0c0a09 100%);
            overflow: hidden; 
        }
        
        .font-ninja { font-family: 'Shojumaru', system-ui; }
        
        /* Intro & Exit Screens */
        #intro-screen, #exit-screen {
            position: fixed;
            inset: 0;
            background: #0c0a09;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease-in-out;
        }
        #exit-screen {
            z-index: 100;
            display: none;
            opacity: 0;
        }
        .story-video {
            max-width: 90vw;
            max-height: 70vh;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(153, 27, 27, 0.3);
            margin-bottom: 2rem;
            object-fit: contain;
        }
        .skip-btn {
            background: transparent;
            color: var(--paper);
            padding: 0.75rem 2rem;
            border: 1px solid var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
            margin: 0.5rem;
        }
        .skip-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* Manga Book Layout */
        .manga-wrapper {
            display: none; 
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            perspective: 1500px;
            transition: opacity 0.8s ease-in-out;
        }
        
        .manga-book {
            width: 95vw;
            max-width: 900px;
            height: 85vh;
            background-color: var(--paper);
            color: var(--ink);
            box-shadow: -15px 0 35px rgba(0,0,0,0.9), inset 20px 0 30px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/></filter><rect width="100%" height="100%" filter="url(%23noise)" opacity="0.04"/></svg>');
            border-right: 3px solid #d6d3d1;
            border-radius: 2px 8px 8px 2px;
        }

        .manga-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 3rem 4rem 3rem 5rem;
            display: flex;
            flex-direction: column;
            opacity: 1;
            transform-origin: left center;
        }

        /* Sophisticated Design Elements */
        .chapter-header {
            border-bottom: 1px solid var(--muted);
            padding-bottom: 1rem;
            margin-bottom: 2rem;
        }
        
        .manga-image-placeholder {
            width: 100%;
            height: 180px;
            border: 1px solid var(--ink);
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--ink);
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(0,0,0,0.03) 10px,
                rgba(0,0,0,0.03) 20px
            );
        }

        /* Wisdom Button & Modal */
        .wisdom-trigger-btn {
            background: transparent;
            color: var(--accent);
            border: 2px solid var(--accent);
            padding: 0.75rem 1.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: auto;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            align-self: flex-start;
        }
        
        .wisdom-trigger-btn:hover {
            background: var(--accent);
            color: var(--paper);
        }

        .wisdom-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(12, 10, 9, 0.85);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .wisdom-modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .wisdom-modal-content {
            background: var(--paper);
            border: 4px solid var(--accent);
            padding: 2.5rem;
            max-width: 600px;
            width: 90%;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border-radius: 4px;
        }

        .wisdom-modal-overlay.active .wisdom-modal-content {
            transform: scale(1);
        }

        .close-modal-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--ink);
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal-btn:hover {
            color: var(--accent);
        }

        /* Navigation & Timer */
        .manga-nav {
            height: 70px;
            border-top: 1px solid var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2rem;
            position: relative;
        }

        .nav-btn {
            color: var(--ink);
            padding: 0.5rem 1rem;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .nav-btn:hover:not(:disabled) {
            color: var(--accent);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .timer-track {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            background: rgba(0,0,0,0.1);
            width: 100%;
        }
        
        .timer-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
        }

        /* Custom Ninja Auto-Turn Animation Elements */
        #ninja-animator {
            position: fixed;
            top: 50%;
            transform: translateY(-50%) translateX(100vw);
            font-size: 6rem;
            color: var(--ink);
            z-index: 9999;
            pointer-events: none;
            text-shadow: -10px 0 20px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: -20px;
        }

        .run-ninja-dash { animation: ninja-dash 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .run-page-flip { animation: page-flip 1.2s ease-in-out forwards; }

        @keyframes ninja-dash {
            0% { transform: translateY(-50%) translateX(100vw) scaleX(-1); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-50%) translateX(-50vw) scaleX(-1); opacity: 1; }
        }

        @keyframes page-flip {
            0% { transform: rotateY(0deg); opacity: 1; }
            40% { transform: rotateY(-90deg); opacity: 0; }
            60% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        .manga-content::-webkit-scrollbar { width: 6px; }
        .manga-content::-webkit-scrollbar-track { background: transparent; }
        .manga-content::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 3px; }
    </style>
</head>
<body>

    <!-- Intro Screen -->
    <div id="intro-screen">
        <video id="intro-video" class="story-video" playsinline onended="startJourney()">
            <source src="Take_the_above_story_My_Shino.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        <div class="flex flex-wrap justify-center mt-4">
            <button id="play-intro-btn" class="skip-btn" style="display: none;" onclick="forcePlayIntro()">Unseal Scroll (Play Audio)</button>
            <button class="skip-btn" onclick="startJourney()">Skip to Archives</button>
        </div>
    </div>

    <!-- Manga Book Wrapper -->
    <div class="manga-wrapper" id="manga-wrapper">
        <div class="manga-book">
            <div class="manga-content" id="manga-content">
                <!-- Content injected via JS -->
            </div>
            
            <div class="manga-nav">
                <button id="prev-btn" class="nav-btn" onclick="goPrev()">
                    <i class="fa-solid fa-arrow-left"></i> Previous Chapter
                </button>
                <div id="page-indicator" class="font-ninja text-muted tracking-widest"></div>
                <div style="width: 150px;"></div> <!-- Spacer -->

                <div class="timer-track">
                    <div id="timer-fill" class="timer-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- The Ninja that auto-turns the page -->
    <div id="ninja-animator">
        <i class="fa-solid fa-user-ninja"></i>
    </div>

    <!-- Sannin's Wisdom Modal -->
    <div id="wisdom-modal" class="wisdom-modal-overlay" onclick="closeWisdomModal()">
        <div class="wisdom-modal-content" onclick="event.stopPropagation()">
            <button class="close-modal-btn" onclick="closeWisdomModal()">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="flex items-center gap-3 mb-4 text-accent">
                <i class="fa-solid fa-scroll text-2xl"></i>
                <h3 class="font-ninja text-xl tracking-wider uppercase">Sannin's Wisdom</h3>
            </div>
            <p id="wisdom-modal-text" class="text-lg text-ink italic leading-relaxed font-medium"></p>
        </div>
    </div>

    <!-- Exit Screen -->
    <div id="exit-screen">
        <h2 class="font-ninja text-3xl md:text-5xl text-accent mb-6 tracking-widest text-center drop-shadow-[0_0_10px_rgba(153,27,27,0.8)]">
            The Journey Continues...
        </h2>
        <video id="exit-video" class="story-video" playsinline onended="finishSaga()">
            <source src="Let_s_convert_this_entire_text.mp4" type="video/mp4">
            Your browser does not support HTML video.
        </video>
        <button class="skip-btn mt-4" onclick="finishSaga()">Conclude Record</button>
    </div>

    <script>
        const chapters = [
            {
                chapterName: "Chapter 1",
                title: "The Genjutsu of Orkut",
                icon: "fa-comment-slash",
                content: `At the Age of 13, I was introduced to Orkut by my friends, registering with a simple Yahoo account. I started exploring chatrooms, figuring out internet usage and instant messaging. However, one day I faced sudden humiliation: a friend's mother was furious at me for sending inappropriate messages on Orkut. I denied it relentlessly—because I hadn't done it—but I also had no idea *who* did, or *how*. That invisible attack was my first real encounter with hacking, though I didn't know the term back then. I lost a friend that day, but the mystery of that infiltration took root in the back of my mind. It was my first glimpse into the hidden world of the internet.`,
                wisdom: "Genin, never trust a network blindly. What seems like a friendly message can be a masked adversary. That early betrayal taught me that identifying the true source of an attack is the first rule of defense."
            },
            {
                chapterName: "Chapter 2",
                title: "The Path of the Cadet",
                icon: "fa-person-military-rifle",
                content: `Consciously pushing the Orkut incident aside, I found a new path at 19. I felt a burning duty to serve my country in the armed forces, so I joined the NCC (National Cadet Corps) in India. I trained hard and excelled as a cadet, pouring my soul into the discipline. But fate had a different plan: my eyesight disqualified me from making it into the actual armed forces. It was devastating news. Yet, through that heartbreak and soul-searching, I realized something vital: my physical eyes might have failed the military test, but my mind's eye was perfectly tuned for computers.`,
                wisdom: "A true shinobi adapts to the battlefield. When one path is blocked, find another. The discipline I learned in the NCC became the exact foundation I needed for the rigorous world of Cyber Security."
            },
            {
                chapterName: "Chapter 3",
                title: "Forging the Tools",
                icon: "fa-microchip",
                content: `Before the NCC, I had wanted to test the waters with computers, so I joined the NIIT institute to study hardware. I learned the theory, but I couldn't afford a PC to practice on. To compensate, I fake-boasted to acquaintances that I owned a computer and fixed it myself using my NIIT certification. Believing me, they brought me their actual PC problems. Thanks to my knack for it, the solutions I provided were absolutely correct! But then someone asked me to diagnose their internet connectivity. Realizing my limits, I immediately enrolled in a Network Technician course and aced it. I had unknowingly forged myself into a complete Hardware and Network Technician.`,
                wisdom: "Sometimes, Genin, you must project confidence before you have the tools, and let your skills catch up to your reputation. Understanding the very hardware and wires that carry our data is essential before you can protect them."
            },
            {
                chapterName: "Chapter 4",
                title: "Birth of the Ethical Hacker",
                icon: "fa-user-secret",
                content: `The NCC failure jogged my memories. I needed part-time work to enhance my network skills to join a respected organization, which led me to CCNA. My parents scraped together enough for an academy. I aced CCNA, but my hunger grew. A teacher noticed my drive and suggested three advanced paths: Windows Admin, Linux Admin, and Ethical Hacking. Hearing 'Ethical Hacking' instantly brought the Orkut incident rushing back. The Ethical Hacker in me was born that day. Unable to afford the fees, I begged to be a lab assistant in exchange for lessons. I failed countless times, crushed by guilt and self-doubt. Yet, within 12 months, I mastered the labs and passed the US Council EHCE exam. I even ventured into Bug Bounties, though my early findings were dismissed as trivial.`,
                wisdom: "Failure is just another form of intelligence gathering. Those sleepless nights failing in the labs forged my resilience. A shinobi must know how to break a system in order to truly secure it."
            },
            {
                chapterName: "Chapter 5",
                title: "The Academy Days",
                icon: "fa-school",
                content: `Seeking a solid foundation, I joined Osmania University affiliated Aurora's P.G College for my MCA (Master of Computer Applications). I began showing off my technical skills, but my peers couldn't understand the depth of what I was doing. However, a true mentor appeared: Professor Ismail Mohammed. He saw the raw hacker within me and guided me to channel those skills ethically, teaching me how to mold my rogue chakra into structured, defensive strategies.`,
                wisdom: "Even the most talented shinobi needs a Sensei. Professor Ismail taught me that raw skill without ethical guidance is dangerous. Always seek mentors who elevate your moral compass."
            },
            {
                chapterName: "Chapter 6",
                title: "The First Mission",
                icon: "fa-shield-halved",
                content: `Despite applying everywhere, I couldn't land a 2nd-year internship. Then came a Cyber Security seminar. Professor Ismail urged me to present my hands-on experience. I showcased a tool I developed that captured Facebook credentials via a simple link. A visiting professor from CDAC was blown away! I ended up developing a secure website for them. Still struggling for a permanent role, I eventually landed an apprenticeship at ECIL. I shifted to pure defense, helping them deploy their SIEM platform. Impressed, CDAC recommended me to DRDO (Defense Research and Development Organization). I assembled a 3-man squad (myself, a male friend, and a female friend) and successfully landed a 6-month internship at DRDO, capping off my post-graduation in triumph.`,
                wisdom: "Notice how I formed a balanced 3-man squad for the DRDO mission? Teamwork is everything. And remember: offensive knowledge (the Facebook exploit) is what proves you know how to build a strong defense."
            },
            {
                chapterName: "Chapter 7",
                title: "Building the Allied Forces",
                icon: "fa-network-wired",
                content: `Post-graduation brought a dark cloud; rejections piled up everywhere I applied. But my inner fire never died. I joined the Null Hyderabad chapter, immersing myself in the local InfoSec community. I began giving presentations on both offensive attacks and defensive countermeasures, painting the larger picture of security. This drastically boosted my reputation and expanded my network. I wasn't just learning anymore; I was sharing chakra with the village.`,
                wisdom: "Your network is your strongest village, Genin. When corporations close their doors, the community will open theirs. Sharing knowledge is the fastest way to master it yourself."
            },
            {
                chapterName: "Chapter 8",
                title: "The Frontlines",
                icon: "fa-khanda",
                content: `Through a connection in my network, I was recommended for a vacancy at Anthelio Solutions. In July 2016, I joined as an Information Security Associate. Though new to the corporate world, I was a veteran of attack and defense scenarios. I quickly recommended crucial improvements backed by hard evidence. Promoted to InfoSec Assistant, I took on Level 1 Incident Response. I honed my skills, authored critical IR playbooks, and introduced automation using Ansible, Chef, Puppet, and Python, earning another promotion as a full Incident Responder.`,
                wisdom: "Never wait for orders when you see a vulnerability. Bring evidence, propose a solution, and automate the mundane. That is how a Genin becomes a Chunin on the battlefield."
            },
            {
                chapterName: "Chapter 9",
                title: "Unlocking Sage Mode",
                icon: "fa-eye",
                content: `It was time to grow wings. I switched to Synchrony in May 2018 as a JSOC Analyst. I aimed to overhaul their security operations. I realized that to improve investigations, we had to fundamentally enhance the security content that triggered the alerts. Showcasing my knack for deep engineering, within 6 months (Nov 2018), I was pulled into the elite Security Engineering department. My mission: build context-rich security content and write the Python code to make it execute flawlessly.`,
                wisdom: "Responding to alerts is good, but engineering the alerts is Sage Mode. To defeat the enemy, you must understand the very fabric of the logic that detects them."
            },
            {
                chapterName: "Chapter 10",
                title: "Mastery of Automations",
                icon: "fa-robot",
                content: `I spent 8 glorious months forging Intrusion Detection Rules, SIEM logic, writing CEF parsers, and implementing deep packet inspection mechanisms. Recognizing my mastery, leadership asked me to validate and deploy a SOAR platform. After 3 months of intense labor, we successfully deployed Palo Alto Cortex XSOAR in May 2019. I had automated the village's defenses.`,
                wisdom: "SOAR is the ultimate Shadow Clone Jutsu. Why fight a thousand threats with your own hands when you can script your clones to neutralize them in milliseconds?"
            },
            {
                chapterName: "Chapter 11",
                title: "The Legendary Sannin",
                icon: "fa-dragon",
                content: `From that point on, I built incredibly complex playbooks and automation scripts aimed at auto-containment and remediation. My work reduced the JSOC's manual workload by a massive 35%. Promoted consistently every 2 years, I earned the right to build my own Anbu squad. Today, I lead a team of 7 FTEs as an Assistant Vice President—balancing technical mastery with managerial strategy. The Sannin was born.`,
                wisdom: "A Sannin doesn't just fight; they lead. My greatest Jutsu now isn't a script; it's the 7 brilliant shinobi on my team. Train your squad well, for they are the future of the village."
            }
        ];

        let currentPage = 0;
        let isAnimating = false;
        let journeyStarted = false;
        
        // Timer Configuration (1 Minute)
        const AUTO_TURN_MS = 5000; 
        let autoTurnTimeout;
        let introPlayPromise;

        // Initialize Intro Video Playback Safely
        document.addEventListener("DOMContentLoaded", () => {
            const introVid = document.getElementById('intro-video');
            const playBtn = document.getElementById('play-intro-btn');
            
            // Attempt to autoplay with audio. If blocked by browser policy, show play button.
            introPlayPromise = introVid.play();
            if (introPlayPromise !== undefined) {
                introPlayPromise.catch(error => {
                    if (error.name !== 'AbortError') {
                        playBtn.style.display = 'inline-block';
                    }
                });
            }
        });

        function forcePlayIntro() {
            const introVid = document.getElementById('intro-video');
            introPlayPromise = introVid.play();
            if (introPlayPromise !== undefined) {
                introPlayPromise.catch(error => {
                    // Ignore abort errors which occur if user skips instantly
                });
            }
            document.getElementById('play-intro-btn').style.display = 'none';
        }

        function startJourney() {
            if(journeyStarted) return;
            journeyStarted = true;
            
            const video = document.getElementById('intro-video');
            
            // Safely pause the video only after the play promise resolves
            if (introPlayPromise !== undefined) {
                introPlayPromise.then(() => {
                    video.pause();
                }).catch(() => {
                    // Ignore, playback was blocked or aborted anyway
                });
            } else {
                video.pause();
            }

            const intro = document.getElementById('intro-screen');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('manga-wrapper').style.display = 'flex';
                renderPage();
                startAutoTurnTimer();
            }, 1000);
        }

        function renderPage() {
            const data = chapters[currentPage];
            const contentDiv = document.getElementById('manga-content');
            
            let html = `
                <div class="chapter-header flex justify-between items-end">
                    <div>
                        <span class="font-ninja text-accent tracking-widest text-sm">${data.chapterName}</span>
                        <h2 class="text-3xl font-bold mt-1">${data.title}</h2>
                    </div>
                </div>
                
                <div class="manga-image-placeholder">
                    <i class="fa-solid ${data.icon}"></i>
                </div>

                <div class="text-lg leading-relaxed font-medium mb-10 text-justify">
                    ${data.content}
                </div>

                <div class="flex items-center gap-4 mt-auto">
                    <button class="wisdom-trigger-btn" onclick="openWisdomModal()">
                        <i class="fa-solid fa-scroll"></i> Read Sannin's Wisdom
                    </button>
                    ${currentPage === chapters.length - 1 ? `
                    <button class="wisdom-trigger-btn" style="border-color: var(--ink); color: var(--ink);" onclick="showExitVideo()">
                        <i class="fa-solid fa-door-open"></i> Conclude Journey
                    </button>
                    ` : ''}
                </div>
            `;
            
            contentDiv.innerHTML = html;
            contentDiv.scrollTop = 0;
            
            document.getElementById('page-indicator').textContent = `Scroll ${currentPage + 1} of ${chapters.length}`;
            document.getElementById('prev-btn').disabled = currentPage === 0;
        }

        function startAutoTurnTimer() {
            clearTimeout(autoTurnTimeout);
            const timerFill = document.getElementById('timer-fill');
            
            timerFill.style.transition = 'none';
            timerFill.style.width = '0%';
            void timerFill.offsetWidth; // Force Reflow
            
            // If on the last page, the timer completes the journey instead of turning a page
            if (currentPage >= chapters.length - 1) {
                timerFill.style.transition = `width ${AUTO_TURN_MS}ms linear`;
                timerFill.style.width = '100%';
                autoTurnTimeout = setTimeout(() => {
                    showExitVideo();
                }, AUTO_TURN_MS);
                return;
            }

            timerFill.style.transition = `width ${AUTO_TURN_MS}ms linear`;
            timerFill.style.width = '100%';
            autoTurnTimeout = setTimeout(() => {
                triggerAutoTurn();
            }, AUTO_TURN_MS);
        }

        function showExitVideo() {
            clearTimeout(autoTurnTimeout);
            const manga = document.getElementById('manga-wrapper');
            const exitScreen = document.getElementById('exit-screen');
            const exitVideo = document.getElementById('exit-video');

            manga.style.opacity = '0';
            setTimeout(() => {
                manga.style.display = 'none';
                exitScreen.style.display = 'flex';
                void exitScreen.offsetWidth; // Reflow
                exitScreen.style.opacity = '1';
                
                // Safely handle the exit video playback
                const exitPlayPromise = exitVideo.play();
                if (exitPlayPromise !== undefined) {
                    exitPlayPromise.catch(error => {
                        console.warn("Exit video play interrupted/blocked:", error);
                    });
                }
            }, 800);
        }

        function finishSaga() {
            document.getElementById('exit-screen').innerHTML = `
                <h1 class="font-ninja text-5xl text-accent drop-shadow-[0_0_10px_rgba(153,27,27,0.8)]">
                    The End
                </h1>
                <p class="text-muted mt-4">Thank you for walking this shinobi path with me.</p>
            `;
        }

        // --- Wisdom Modal Logic ---
        function openWisdomModal() {
            const data = chapters[currentPage];
            document.getElementById('wisdom-modal-text').innerText = `"${data.wisdom}"`;
            document.getElementById('wisdom-modal').classList.add('active');
            
            clearTimeout(autoTurnTimeout);
            const timerFill = document.getElementById('timer-fill');
            const currentWidth = window.getComputedStyle(timerFill).width;
            timerFill.style.transition = 'none';
            timerFill.style.width = currentWidth;
        }

        function closeWisdomModal() {
            document.getElementById('wisdom-modal').classList.remove('active');
            startAutoTurnTimer();
        }

        function triggerAutoTurn() {
            if (isAnimating || currentPage >= chapters.length - 1) return;
            isAnimating = true;

            const ninja = document.getElementById('ninja-animator');
            const content = document.getElementById('manga-content');
            
            ninja.classList.remove('run-ninja-dash');
            content.classList.remove('run-page-flip');
            void ninja.offsetWidth;
            void content.offsetWidth;
            
            ninja.classList.add('run-ninja-dash');
            content.classList.add('run-page-flip');

            setTimeout(() => {
                currentPage++;
                renderPage();
            }, 600); 

            setTimeout(() => {
                ninja.classList.remove('run-ninja-dash');
                content.classList.remove('run-page-flip');
                isAnimating = false;
                startAutoTurnTimer(); 
            }, 1200); 
        }

        function goPrev() {
            if (isAnimating || currentPage === 0) return;
            isAnimating = true;
            
            const content = document.getElementById('manga-content');
            content.classList.remove('run-page-flip');
            void content.offsetWidth;
            content.classList.add('run-page-flip');

            setTimeout(() => {
                currentPage--;
                renderPage();
            }, 600);

            setTimeout(() => {
                content.classList.remove('run-page-flip');
                isAnimating = false;
                startAutoTurnTimer(); 
            }, 1200);
        }

    </script>
</body>
</html>
